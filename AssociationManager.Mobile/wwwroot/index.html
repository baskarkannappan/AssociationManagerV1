<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AssociationManager Mobile</title>
    <base href="/" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link href="_content/Blazor.Bootstrap/blazor.bootstrap.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="AssociationManager.Mobile.styles.css" />
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        #app {
            height: 100%;
            width: 100%;
            overflow-y: auto;
        }
        .loading-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0b0c10 0%, #1f2833 100%);
            z-index: 10000;
        }
        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(102, 252, 241, 0.1);
            border-left-color: #66fcf1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .fade-out {
            opacity: 0;
            transition: opacity 0.6s ease-out;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="loading-container" class="loading-container">
        <div class="loader"></div>
        <div class="mt-4 h5" style="color: #66fcf1;">STARTING SYSTEM</div>
        <div class="text-muted small">Please wait...</div>
    </div>

    <div id="app"></div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="_content/Blazor.Bootstrap/blazor.bootstrap.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    
    <script>
        window.hideAppLoader = function() {
            console.log("[JS] Hiding loader...");
            console.log("[DOM] " + document.getElementById('app').innerHTML);
            const container = document.getElementById('loading-container');
            if (container) {
                container.classList.add('fade-out');
                setTimeout(() => container.remove(), 1000);
            }
        };

        // Fallback: hide after 10 seconds if C# doesn't call it
        setTimeout(window.hideAppLoader, 10000);
    </script>
</body>
</html>
