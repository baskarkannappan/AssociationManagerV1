name: Azure Infrastructure Deployment

on:
  workflow_dispatch:
  push:
    paths:
      - 'Deployment/Azure/infra/**'
    branches:
      - develop

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v1
        with:
          resourceGroupName: 'rg-assocmgr-dev'
          template: Deployment/Azure/infra/main.bicep
          parameters: environmentName=dev administratorLogin=appadmin administratorLoginPassword=${{ secrets.SQL_ADMIN_PASSWORD }}
          failOnStdErr: false
