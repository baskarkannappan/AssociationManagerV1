name: Build Local Docker Images

on:
  workflow_dispatch: # Allows manual trigger from GitHub Actions dashboard

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-local:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: "gateway"
            folder: "Gateway"
          - service: "api"
            folder: "Api"
          - service: "corp-api"
            folder: "Corporate.Api"
            
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: AssociationManager.${{ matrix.folder }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/assoc-${{ matrix.service }}:local
          cache-from: type=gha
          cache-to: type=gha,mode=max
