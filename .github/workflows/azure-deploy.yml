name: Azure Application Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths-ignore:
      - 'Docs/**'
      - 'README.md'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-database:
    runs-on: windows-latest # Windows needed for .sqlproj / MSBuild
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Database Project
        run: msbuild AssociationManager.DBSchemas/AssociationManager.DBSchemas/AssociationManager.DBSchemas.sqlproj /p:Configuration=Release

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy SQL Schema
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: 'AssociationManager.DBSchemas/AssociationManager.DBSchemas/bin/Release/AssociationManager.DBSchemas.dacpac'
          action: 'Publish'

  build-and-deploy:
    needs: deploy-database
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway
            folder: Gateway
          - service: api
            folder: Api
          - service: corp-api
            folder: Corporate.Api
          - service: worker
            folder: Worker
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME || secrets.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.ACR_NAME || secrets.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }} -f AssociationManager.${{ matrix.folder }}/Dockerfile .
          docker push ${{ vars.ACR_NAME || secrets.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ vars.ACR_NAME || secrets.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }}
          containerAppName: assocmgr-dev-${{ matrix.service }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP || secrets.AZURE_RESOURCE_GROUP }}
          acrName: ${{ vars.ACR_NAME || secrets.ACR_NAME }}
          managedEnvironmentName: ${{ vars.AZURE_ENV_NAME || secrets.AZURE_ENV_NAME }}

  deploy-clients:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - client: Client
            secret_suffix: CLIENT
          - client: Corporate.Client
            secret_suffix: CORPORATE_CLIENT
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[format('SWA_TOKEN_{0}', matrix.secret_suffix)] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/AssociationManager.${{ matrix.client }}"
          output_location: "wwwroot"
