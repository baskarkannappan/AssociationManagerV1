name: Azure Application Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths-ignore:
      - 'Docs/**'
      - 'README.md'
      - 'Deployment/Azure/infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway
            folder: Gateway
          - service: api
            folder: Api
          - service: corp-api
            folder: Corporate.Api
          - service: worker
            folder: Worker
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ vars.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }} -f AssociationManager.${{ matrix.folder }}/Dockerfile .
          docker push ${{ vars.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }}

      - name: Deploy to Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          imageToDeploy: ${{ vars.ACR_NAME }}.azurecr.io/assoc-${{ matrix.service }}:${{ github.sha }}
          containerAppName: assocmgr-qa-${{ matrix.service }}
          resourceGroup: ${{ vars.AZURE_RESOURCE_GROUP }}

  deploy-clients:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        client: [Client, Corporate.Client]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[format('SWA_TOKEN_{0}', matrix.client)] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/AssociationManager.${{ matrix.client }}"
          output_location: "wwwroot"
