name: Azure Application Deployment

on:
  workflow_dispatch:
  push:
    branches:
      - develop
    paths-ignore:
      - 'Docs/**'
      - 'README.md'

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy-database:
    runs-on: windows-latest # Windows needed for .sqlproj / MSBuild
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Database Project
        run: msbuild AssociationManager.DBSchemas/AssociationManager.DBSchemas/AssociationManager.DBSchemas.sqlproj /p:Configuration=Release

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Subscription
        run: az account set --subscription 325ea257-cca8-4829-aca6-23416e28a2f1

      - name: Deploy SQL Schema
        uses: azure/sql-action@v2
        with:
          connection-string: ${{ secrets.SQL_CONNECTION_STRING }}
          path: 'AssociationManager.DBSchemas/AssociationManager.DBSchemas/bin/Release/AssociationManager.DBSchemas.dacpac'
          action: 'Publish'

  build-and-deploy:
    needs: deploy-database
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: gateway
            folder: Gateway
          - service: api
            folder: Api
          - service: corp-api
            folder: Corporate.Api
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Subscription
        run: az account set --subscription 325ea257-cca8-4829-aca6-23416e28a2f1

      - name: Pull Base Images
        run: |
          docker pull mcr.microsoft.com/dotnet/sdk:9.0-noble
          docker pull mcr.microsoft.com/dotnet/aspnet:9.0-bookworm-slim

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and Push Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/assoc-${{ matrix.service }}:${{ github.sha }} -f AssociationManager.${{ matrix.folder }}/Dockerfile .
          docker push ghcr.io/${{ github.repository_owner }}/assoc-${{ matrix.service }}:${{ github.sha }}

      - name: Update Container App Image
        env:
          RG: "rg-assocmgr-dev"
        run: |
          az containerapp update \
            --name "assocmgr-dev-${{ matrix.service }}" \
            --resource-group "$RG" \
            --image "ghcr.io/${{ github.repository_owner }}/assoc-${{ matrix.service }}:${{ github.sha }}"

  deploy-clients:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - client: Client
            secret_suffix: CLIENT
          - client: Corporate.Client
            secret_suffix: CORPORATE_CLIENT
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets[format('SWA_TOKEN_{0}', matrix.secret_suffix)] }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/AssociationManager.${{ matrix.client }}"
          output_location: "wwwroot"
# Triggering build with GH_PACKAGE_TOKEN
